<!DOCTYPE html>
<html>
<head>
  <title>Equinox Booking</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

  <h1>Equinox Booking</h1>
  <button onclick="testConnection()">Test Database Connection</button>

  <p id="result"></p>

  <script>
    const supabaseUrl = "https://uzfamakqdytiotqjjocc.supabase.co"
    const supabaseKey = "sb_publishable_FCWZUsIluAHa48ZxVjMoeA_gffGt0WR"

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

    async function testConnection() {
      const { data, error } = await supabase
        .from('members')
        .select('*')

      if (error) {
        document.getElementById("result").innerText = "❌ Error: " + error.message
      } else {
        document.getElementById("result").innerText = "✅ Connected to database!"
      }
    }
  </script>

</body>
</html>
